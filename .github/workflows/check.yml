name: Check

on:
  push:
    branches:
      - main
  pull_request:

# cancel in-progress runs on new commits to same PR (gitub.event.number)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  check:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: ♻️ Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-install-${{ runner.os }}-

      - name: ♻️ Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: 🛠️ Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔗 Check dependency versions
        run: bun syncpack lint

      - name: 📐 Check package.json formatting
        run: bun syncpack format --check

      - name: 🧪 Run fmt check
        run: bun run prettier --check .

      - name: 🧪 Run lint
        run: bun run lint

      - name: 🎁 Run build
        run: bun run build
        env:
          NODE_ENV: production

      - name: 🔎 Typecheck
        run: bun run typecheck

      - name: 🧪 Run test
        run: bun run test

      - name: 📙 Run Docs
        run: bun run docs:prepare

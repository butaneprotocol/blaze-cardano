name: e2e

on:
  push:
    branches:
      - main
  pull_request:

# cancel in-progress runs on new commits to same PR (gitub.event.number)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    if: ${{ github.actor != 'dependabot[bot]' }}
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      SEED_MNEMONIC: ${{ secrets.SEED_MNEMONIC }}
      BLOCKFROST_KEY: ${{ secrets.BLOCKFROST_KEY }}
    steps:
      - name: ✅ Verify required secrets
        run: |
          if [ -z "${SEED_MNEMONIC}" ]; then echo "SEED_MNEMONIC secret is not set"; exit 1; fi
          if [ -z "${BLOCKFROST_KEY}" ]; then echo "BLOCKFROST_KEY secret is not set"; exit 1; fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: ♻️ Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-install-${{ runner.os }}-

      - name: ♻️ Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: 🛠️ Install dependencies
        run: bun install --frozen-lockfile

      - name: 🎁 Run build
        run: bun run build
        env:
          NODE_ENV: production

      - name: Run e2e tests
        run: cd packages/e2e && bun run test
